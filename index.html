<!DOCTYPE html>
<html>
<head>
  <title>Chatterbox (Habla con desconocidos!)</title>
  <style>
    /* ---------------- Body / Windows XP style ---------------- */
    body {
      font-family: "Tahoma", sans-serif;
      background: #008080; /* XP teal background */
      color: #000;
      text-align: center;
      margin: 0;
      padding: 0;
    }

    /* ---------------- Header / Logo ---------------- */
    #headerLogo {
      background: linear-gradient(to bottom, #cce7ff, #99ccff);
      padding: 10px;
      border-bottom: 2px solid #3b6ea5;
      box-shadow: inset 0 0 3px rgba(255,255,255,0.7);
    }

    #headerLogo img#logo {
      height: 50px;
      vertical-align: middle;
    }

    /* ---------------- Login Screen ---------------- */
    #loginScreen {
      margin-top: 50px;
    }

    #loginScreen input {
      padding: 6px;
      width: 200px;
      border: 2px inset #fff;
      background: #e0e0e0;
      font-size: 14px;
    }

    #loginScreen button {
      padding: 6px 12px;
      border: 2px outset #fff;
      background: #cce7ff;
      cursor: pointer;
      font-weight: bold;
      margin-left: 5px;
    }

    #loginScreen button:hover {
      background: #99ccff;
    }

    /* ---------------- Chat Window ---------------- */
    #chatUI {
      display: none;
      margin-top: 20px;
    }

    #chat {
      height: 300px;
      overflow-y: auto;
      border: 2px solid #3b6ea5;
      margin: 10px auto;
      width: 70%;
      padding: 10px;
      background: #e0f0ff;
      border-radius: 4px;
    }

    /* ---------------- Messages / Bubbles ---------------- */
    .message {
      display: flex;
      align-items: center;
      margin: 8px 0;
    }

    .message .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin-right: 8px;
      background-size: cover;
      background-position: center;
      border: 2px solid #3b6ea5;
    }

    .message.me .bubble {
      background: #b3f0b3;
      border: 1px solid #3b6ea5;
      padding: 5px 8px;
      border-radius: 4px;
      margin-left: auto;
      max-width: 70%;
    }

    .message.other .bubble {
      background: #fff48c;
      border: 1px solid #3b6ea5;
      padding: 5px 8px;
      border-radius: 4px;
      max-width: 70%;
    }

    /* ---------------- Input & Buttons ---------------- */
    input#msg {
      padding: 6px;
      width: 50%;
      border: 2px inset #fff;
      margin-top: 10px;
    }

    button {
      padding: 6px 12px;
      border: 2px outset #fff;
      background: #cce7ff;
      cursor: pointer;
      font-weight: bold;
      margin-left: 5px;
    }

    button:hover {
      background: #99ccff;
    }

    /* Scrollbar (XP style) */
    #chat::-webkit-scrollbar {
      width: 10px;
    }
    #chat::-webkit-scrollbar-thumb {
      background: #99ccff;
      border: 1px solid #3b6ea5;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<div id="headerLogo">
  <img id="logo" src="https://preview.redd.it/msn-avatars-of-all-colors-v0-h70w8hxd5uha1.png?width=1024&format=png&auto=webp&s=ea9360b378a5f63881fc093f5c9097a60eadc47e" alt="Logo">
</div>

<div id="loginScreen">
  <h2>Enter Your School Email</h2>
  <input id="emailInput" placeholder="your@school.edu" />
  <button onclick="enterChat()">Join Chat</button>
</div>

<div id="chatUI">
  <button onclick="nextUser()">Next User</button>
  <div id="chat"></div>
  <input id="msg" placeholder="Type message..." />
  <button onclick="send()">Send</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, get, remove, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // 🔴 Replace with your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAjL7xTLgVNsmpP2cKwDHWoR_LKH4M90F8",
    authDomain: "chatterbox-cc42e.firebaseapp.com",
    databaseURL: "https://chatterbox-cc42e-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "chatterbox-cc42e",
    storageBucket: "chatterbox-cc42e.firebasestorage.app",
    messagingSenderId: "660510708256",
    appId: "1:660510708256:web:1d01e5ddd35a15a9a0a245"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let username = null;
  let userId = "user_" + Math.random().toString(36).substring(2,9);
  let currentRoom = null;

  const waitingRef = ref(db, "waiting");
  const roomsRef = ref(db, "rooms");

  function enterChat() {
    const email = document.getElementById("emailInput").value.trim();
    if (!email) { alert("Enter your email!"); return; }
    const allowedDomain = "school.edu"; // Replace with your school domain
    const domain = email.split("@")[1];
    if (domain !== allowedDomain) { alert("Only school emails allowed!"); return; }

    username = email.split("@")[0];
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("chatUI").style.display = "block";
    startChat();
  }

  async function findPartner() {
    const snapshot = await get(waitingRef);
    if (snapshot.exists()) {
      const users = Object.keys(snapshot.val());
      for (let partnerId of users) {
        if (partnerId !== userId) {
          const roomId = userId + "_" + partnerId;
          await set(ref(db, "rooms/" + roomId), { users: [userId, partnerId] });
          await remove(ref(db, "waiting/" + partnerId));
          return roomId;
        }
      }
    }
    await set(ref(db, "waiting/" + userId), true);
    return null;
  }

  window.startChat = async function() {
    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = "<p>⏳ Looking for partner...</p>";
    const room = await findPartner();
    if (room) joinRoom(room); else listenForMatch();
  }

  function listenForMatch() {
    onChildAdded(roomsRef, (data) => {
      const room = data.key;
      const users = data.val().users;
      if (users.includes(userId)) joinRoom(room);
    });
  }

  function joinRoom(roomId) {
    currentRoom = roomId;
    const chatRef = ref(db, "messages/" + roomId);
    const chatDiv = document.getElementById("chat");
    chatDiv.innerHTML = "<p>✅ Connected! Say hi 👋</p>";

    onChildAdded(chatRef, (data) => {
      const msg = data.val();
      const isMe = msg.userId === userId;
      const msgHtml = `
        <div class="message ${isMe ? "me" : "other"}">
          <div class="avatar" style="background-image:url(${isMe ? "green.png" : "yellow.png"});"></div>
          <div class="bubble"><b>${msg.username}:</b><br>${msg.text}</div>
        </div>`;
      chatDiv.innerHTML += msgHtml;
      chatDiv.scrollTop = chatDiv.scrollHeight;
    });

    window.send = function() {
      const input = document.getElementById("msg");
      if (!input.value.trim()) return;
      push(chatRef, { userId, username, text: input.value });
      input.value = "";
    };
  }

  window.nextUser = async function() {
    if (currentRoom) {
      await remove(ref(db, "messages/" + currentRoom));
      currentRoom = null;
    }
    startChat();
  };
</script>

</body>
</html>
