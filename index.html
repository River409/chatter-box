<!DOCTYPE html>
<html>
<head>
  <title>Chatterbox (Habla con randoms!)</title>
  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    #chat {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #333;
      margin: 10px auto;
      width: 80%;
      padding: 10px;
      background: #1a1a1a;
    }

    input {
      padding: 10px;
      width: 60%;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
      border: none;
      background: #4CAF50;
      color: white;
    }

    button:hover {
      background: #45a049;
    }

    /* NEW: message layout */
    .message {
      display: flex;
      align-items: flex-start;
      margin: 8px 0;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      margin-right: 10px;
      border: 2px solid #333;
    }

    .message.me .avatar {
      background: #4CAF50;
    }

    .message.other .avatar {
      background: #FFD700;
    }

    .bubble {
      background: white;
      color: black;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      max-width: 70%;
    }

    .message.me {
      justify-content: flex-end;
    }

    .message.me .bubble {
      background: #dcf8c6;
    }

    .message.me .avatar {
      order: 2;
      margin-left: 10px;
      margin-right: 0;
    }
  </style>
</head>
<body>

<!-- NEW: Username screen -->
<div id="loginScreen">
  <h2>Enter a username</h2>
  <input id="usernameInput" placeholder="Your username..." />
  <br><br>
  <button onclick="enterChat()">Join Chat</button>
</div>

<!-- EXISTING UI wrapped -->
<div id="chatUI" style="display:none;">
  <h1>Chatterbox 💬</h1>

  <button onclick="startChat()">Start Chat</button>
  <button onclick="nextUser()">Next</button>

  <div id="chat"></div>

  <input id="msg" placeholder="Type message..." />
  <button onclick="send()">Send</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase,
    ref,
    set,
    get,
    remove,
    push,
    onChildAdded
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjL7xTLgVNsmpP2cKwDHWoR_LKH4M90F8",
    authDomain: "chatterbox-cc42e.firebaseapp.com",
    databaseURL: "https://chatterbox-cc42e-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "chatterbox-cc42e",
    storageBucket: "chatterbox-cc42e.firebasestorage.app",
    messagingSenderId: "660510708256",
    appId: "1:660510708256:web:1d01e5ddd35a15a9a0a245"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const userId = "user_" + Math.random().toString(36).substring(2, 9);

  let currentRoom = null;
  let username = "Anonymous"; // NEW

  const waitingRef = ref(db, "waiting");
  const roomsRef = ref(db, "rooms");

  // NEW: enter chat
  window.enterChat = function () {
    const input = document.getElementById("usernameInput");

    if (!input.value.trim()) {
      alert("Enter a username!");
      return;
    }

    username = input.value;

    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("chatUI").style.display = "block";
  };

  async function findPartner() {
    const snapshot = await get(waitingRef);

    if (snapshot.exists()) {
      const users = Object.keys(snapshot.val());

      for (let partnerId of users) {
        if (partnerId !== userId) {
          const roomId = userId + "_" + partnerId;

          await set(ref(db, "rooms/" + roomId), {
            users: [userId, partnerId]
          });

          await remove(ref(db, "waiting/" + partnerId));

          return roomId;
        }
      }
    }

    await set(ref(db, "waiting/" + userId), true);
    return null;
  }

  window.startChat = async function () {
    document.getElementById("chat").innerHTML = "<p>⏳ Looking for partner...</p>";

    const room = await findPartner();

    if (room) {
      joinRoom(room);
    } else {
      listenForMatch();
    }
  };

  function listenForMatch() {
    onChildAdded(roomsRef, (data) => {
      const room = data.key;
      const users = data.val().users;

      if (users.includes(userId)) {
        joinRoom(room);
      }
    });
  }

  function joinRoom(roomId) {
    currentRoom = roomId;

    const chatRef = ref(db, "messages/" + roomId);
    const chatDiv = document.getElementById("chat");

    chatDiv.innerHTML = "<p>✅ Connected! Say hi 👋</p>";

    onChildAdded(chatRef, (data) => {
      const msg = data.val();
      const isMe = msg.sender === userId;

      chatDiv.innerHTML += `
        <div class="message ${isMe ? "me" : "other"}">
          <div class="avatar"></div>
          <div class="bubble">
            <b>${msg.username || "Anonymous"}:</b><br>
            ${msg.text}
          </div>
        </div>
      `;

      chatDiv.scrollTop = chatDiv.scrollHeight;
    });

    window.send = function () {
      const input = document.getElementById("msg");

      if (!input.value.trim()) return;

      push(chatRef, {
        text: input.value,
        sender: userId,
        username: username // NEW
      });

      input.value = "";
    };
  }

  window.nextUser = async function () {
    if (currentRoom) {
      await remove(ref(db, "messages/" + currentRoom));
      currentRoom = null;
    }

    startChat();
  };

</script>

</body>
</html>
