<!DOCTYPE html>
<html>
<head>
  <title>Chatterbox (Habla con randoms!)</title>
  <style>
 /* ---------------- Body & Fonts ---------------- */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom, #1c1c1c, #0f0f0f);
    color: #fff;
    text-align: center;
    margin: 0;
    padding: 0;
}

/* ---------------- Header / Logo ---------------- */
#headerLogo {
    background: linear-gradient(to bottom, #4e8ef7, #2c5abf);
    padding: 15px;
    border-bottom: 2px solid #1a3b7a;
    border-radius: 0 0 12px 12px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
}

#headerLogo img#logo {
    height: 50px;
    display: inline-block;
    vertical-align: middle;
}

/* ---------------- Chat Window ---------------- */
#chat {
    height: 400px;
    overflow-y: auto;
    border: 2px solid #333;
    margin: 20px auto;
    width: 80%;
    padding: 10px;
    background: rgba(30, 30, 30, 0.85); /* semi-transparent */
    border-radius: 12px;
    box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
}

/* ---------------- Message bubbles ---------------- */
.message {
    display: flex;
    align-items: center;
    margin: 10px 0;
    padding: 5px 10px;
    border-radius: 12px;
    max-width: 70%;
    font-size: 14px;
    word-wrap: break-word;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

/* User vs Other */
.message.me {
    background: linear-gradient(to right, #3cb371, #2e8b57);
    margin-left: auto;
    text-align: left;
}

.message.other {
    background: linear-gradient(to right, #f0e68c, #ffd700);
    margin-right: auto;
    text-align: left;
}

/* ---------------- Avatars ---------------- */
.avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    margin-right: 10px;
    background-size: cover;
    background-position: center;
    border: 2px solid #444;
    box-shadow: 1px 1px 4px rgba(0,0,0,0.6);
}

/* ---------------- Input & Buttons ---------------- */
input#msg {
    padding: 10px;
    width: 60%;
    border-radius: 8px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: #fff;
    box-shadow: inset 0 0 5px rgba(255,255,255,0.1);
    margin-bottom: 10px;
}

button {
    padding: 10px 15px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: linear-gradient(to bottom, #4e8ef7, #2c5abf);
    color: white;
    font-weight: bold;
    box-shadow: 0 3px 6px rgba(0,0,0,0.3);
    transition: 0.2s;
}

button:hover {
    background: linear-gradient(to bottom, #6fa0ff, #3b6dcf);
}

/* ---------------- Scrollbar (optional fancy Aero) ---------------- */
#chat::-webkit-scrollbar {
    width: 10px;
}

#chat::-webkit-scrollbar-track {
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
}

#chat::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
}

#chat::-webkit-scrollbar-thumb:hover {
    background: rgba(255,255,255,0.4);
}
  </style>
</head>
<body>

<!-- ===== Username screen ===== -->
<div id="loginScreen">
  <h2>Enter a username</h2>
  <input id="usernameInput" placeholder="Your username..." />
  <br><br>
  <button onclick="enterChat()">Join Chat</button>
</div>

<!-- ===== Main Chat UI ===== -->
<div id="chatUI" style="display:none;">
<h1 id="headerLogo">
  <img src="logo.png" alt="Chatterbox Logo" id="logo">
</h1>

  <button onclick="startChat()">Start Chat</button>
  <button onclick="nextUser()">Next</button>

  <div id="chat"></div>

  <input id="msg" placeholder="Type message..." />
  <button onclick="send()">Send</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase,
    ref,
    set,
    get,
    remove,
    push,
    onChildAdded
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjL7xTLgVNsmpP2cKwDHWoR_LKH4M90F8",
    authDomain: "chatterbox-cc42e.firebaseapp.com",
    databaseURL: "https://chatterbox-cc42e-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "chatterbox-cc42e",
    storageBucket: "chatterbox-cc42e.firebasestorage.app",
    messagingSenderId: "660510708256",
    appId: "1:660510708256:web:1d01e5ddd35a15a9a0a245"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const userId = "user_" + Math.random().toString(36).substring(2, 9);

  let currentRoom = null;
  let username = "Anonymous";

  const waitingRef = ref(db, "waiting");
  const roomsRef = ref(db, "rooms");

  // ===== Enter chat with username =====
  window.enterChat = function () {
    const input = document.getElementById("usernameInput");

    if (!input.value.trim()) {
      alert("Enter a username!");
      return;
    }

    username = input.value;
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("chatUI").style.display = "block";
  };

  async function findPartner() {
    const snapshot = await get(waitingRef);

    if (snapshot.exists()) {
      const users = Object.keys(snapshot.val());

      for (let partnerId of users) {
        if (partnerId !== userId) {
          const roomId = userId + "_" + partnerId;

          await set(ref(db, "rooms/" + roomId), {
            users: [userId, partnerId]
          });

          await remove(ref(db, "waiting/" + partnerId));
          return roomId;
        }
      }
    }

    await set(ref(db, "waiting/" + userId), true);
    return null;
  }

  window.startChat = async function () {
    document.getElementById("chat").innerHTML = "<p>⏳ Looking for partner...</p>";
    const room = await findPartner();
    if (room) {
      joinRoom(room);
    } else {
      listenForMatch();
    }
  };

  function listenForMatch() {
    onChildAdded(roomsRef, (data) => {
      const room = data.key;
      const users = data.val().users;
      if (users.includes(userId)) {
        joinRoom(room);
      }
    });
  }

  function joinRoom(roomId) {
    currentRoom = roomId;
    const chatRef = ref(db, "messages/" + roomId);
    const chatDiv = document.getElementById("chat");

    chatDiv.innerHTML = "<p>✅ Connected! Say hi 👋</p>";

    onChildAdded(chatRef, (data) => {
      const msg = data.val();
      const isMe = msg.sender === userId;

      chatDiv.innerHTML += `
        <div class="message ${isMe ? "me" : "other"}">
          <div class="avatar"></div>
          <div class="bubble">
            <b>${msg.username || "Anonymous"}:</b><br>
            ${msg.text}
          </div>
        </div>
      `;
      chatDiv.scrollTop = chatDiv.scrollHeight;
    });

    window.send = function () {
      const input = document.getElementById("msg");
      if (!input.value.trim()) return;

      push(chatRef, {
        text: input.value,
        sender: userId,
        username: username
      });

      input.value = "";
    };
  }

  window.nextUser = async function () {
    if (currentRoom) {
      await remove(ref(db, "messages/" + currentRoom));
      await remove(ref(db, "rooms/" + currentRoom));
      currentRoom = null;
    }
    startChat();
  };

  // ===== Auto-clean on exit =====
  window.addEventListener("beforeunload", () => {
    if (currentRoom) {
      remove(ref(db, "messages/" + currentRoom));
      remove(ref(db, "rooms/" + currentRoom));
    }
  });
</script>

</body>
</html>
